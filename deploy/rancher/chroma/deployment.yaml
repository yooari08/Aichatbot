apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  namespace: ai-chatbot
  labels:
    app.kubernetes.io/name: chroma
    app.kubernetes.io/component: vector-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chroma
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chroma
        app.kubernetes.io/component: vector-db
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:0.5.23
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: /chroma/chroma
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          volumeMounts:
            - name: data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chroma-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data
  namespace: ai-chatbot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
