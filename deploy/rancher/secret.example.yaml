# Example only — copy to secret.local.yaml, fill values, apply manually.
# Do NOT commit secret.local.yaml. Prefer Rancher UI → Secrets for production.
apiVersion: v1
kind: Secret
metadata:
  name: ai-chatbot-secrets
  namespace: ai-chatbot
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me-strong-password
  # Must match POSTGRES_PASSWORD and postgres service DNS name
  DATABASE_URL: postgresql+asyncpg://aichatbot:change-me-strong-password@postgres:5432/aichatbot
  JWT_SECRET_KEY: change-me-minimum-32-characters-random-secret
